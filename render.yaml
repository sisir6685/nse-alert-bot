services:
  - type: worker
    name: nse-alert-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python cloud_alert_bot.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SCAN_INTERVAL
        value: 300
